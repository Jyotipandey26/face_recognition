<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #000;
            color: #fff;
        }

        /* NAVBAR */
        nav {
            background: #111;
            padding: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: red;
            letter-spacing: 1px;
        }

        /* CONTAINER */
        .container {
            text-align: center;
            margin-top: 120px;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 30px;
        }

        /* BUTTONS */
        button {
            display: block;
            margin: 15px auto;
            padding: 15px 30px;
            width: 250px;
            font-size: 16px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #b20710;
            transform: scale(1.05);
        }

        /* FOOTER */
        footer {
            background: #111;
            color: #aaa;
            text-align: center;
            padding: 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 14px;
        }
    </style>
</head>

<body>

<nav>🎬 Dashboard</nav>

<div class="container">
    <h2>Welcome</h2>

    <button onclick="window.location.href='http://127.0.0.1:5500/first.html/ideax.html'">
        Student Registration
    </button>

    <button onclick="location.href='view.html'">
        View Students
    </button>

    <button onclick="window.location.href='http://127.0.0.1:5500/first.html/link.html'">
        Verify Student ID
    </button>
</div>

<footer>© 2026 Project | All Rights Reserved</footer>

</body>
</html>
